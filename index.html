<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverbullet Proxy Engine v10.0</title>
    <style>
        :root {
            --bg-color: #030508;
            --panel-color: #0b101a;
            --text-color: #e5e7eb;
            --accent-color: #00ff66;
            --accent-dim: rgba(0, 255, 102, 0.15);
            --danger-color: #ff3366;
            --danger-dim: rgba(255, 51, 102, 0.15);
            --border-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }

        .container {
            width: 100%;
            max-width: 750px;
            background-color: rgba(11, 16, 26, 0.95);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(5px);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 15px;
        }

        .header h1 {
            color: var(--accent-color);
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(0, 255, 102, 0.5);
        }
        
        .header h1 span {
            font-size: 0.6em;
            color: #8b949e;
            text-shadow: none;
            letter-spacing: 0;
        }

        .header p {
            font-size: 0.85rem;
            color: #8b949e;
            margin-top: 5px;
        }

        .dev-tag {
            font-size: 0.75rem;
            color: #00ff66;
            margin-top: 12px;
            display: inline-block;
            padding: 4px 10px;
            background: rgba(0, 255, 102, 0.05);
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .dev-tag a {
            color: var(--accent-color);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .dev-tag a:hover {
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.8);
            text-decoration: underline;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .options-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding: 12px;
            background-color: #05070a;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #8b949e;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .checkbox-label input {
            accent-color: var(--accent-color);
            cursor: pointer;
            width: 15px;
            height: 15px;
        }

        label {
            font-size: 0.8rem;
            display: block;
            margin-bottom: 8px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select, button, input[type="text"] {
            width: 100%;
            background-color: #05070a;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        button {
            cursor: pointer;
        }

        select:focus, input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.2);
        }

        .btn-primary {
            background-color: var(--accent-dim);
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .btn-danger {
            background-color: var(--danger-dim);
            border-color: var(--danger-color);
            color: var(--danger-color);
            font-weight: bold;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: var(--danger-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--danger-color);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        .progress-wrapper {
            width: 100%;
            background: #05070a;
            border: 1px solid var(--border-color);
            height: 6px;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
            transition: width 0.1s linear;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #05070a;
            border: 1px solid var(--border-color);
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-stats span {
            color: var(--accent-color);
            font-weight: bold;
            margin-left: 3px;
            margin-right: 8px;
        }

        .search-container {
            margin-bottom: 15px;
            display: none;
        }

        .search-container input {
            color: var(--accent-color);
            border-color: rgba(0, 255, 102, 0.3);
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #020305;
            border: 1px solid var(--border-color);
            color: #39ff14;
            padding: 15px;
            border-radius: 4px;
            resize: none;
            font-size: 0.85rem;
            line-height: 1.5;
            outline: none;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: #8b949e;
            background-color: #1f2937;
        }
        
        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--bg-color);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 550px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .action-buttons {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Silverbullet Proxy Engine <span>v10.0</span></h1>
        <p>Vercel Serverless API Engine // Fastly CDN Architecture</p>
        <div class="dev-tag">developed by : <a href="https://t.me/Silverbullets_bot" target="_blank">@Silverbullets_bot</a></div>
    </div>

    <div class="controls">
        <div>
            <label for="protoSelect">Target Protocol</label>
            <select id="protoSelect">
                <option value="all">ALL PROTOCOLS (MIXED)</option>
                <option value="http">HTTP / HTTPS</option>
                <option value="socks4">SOCKS4</option>
                <option value="socks5">SOCKS5</option>
                <option value="mtproto">MTPROTO (Standard)</option>
                <option value="v2ray">VLESS / VMESS / TROJAN</option>
            </select>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 10px;">
            <button id="resetBtn" class="btn-danger" onclick="resetEngine()">RESET</button>
            <button id="scrapeBtn" class="btn-primary" onclick="startScrape()">EXECUTE AUDIT</button>
        </div>
    </div>

    <div class="options-row">
        <label class="checkbox-label">
            <input type="checkbox" id="checkerToggle" checked> Run Deep Structural Verification (Vercel Safe)
        </label>
    </div>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="status-bar">
        <div id="statusText">System status: Awaiting command...</div>
        <div class="status-stats">
            [ HTTP:<span id="c-http">0</span> 
              S4:<span id="c-socks4">0</span> 
              S5:<span id="c-socks5">0</span> 
              MTP:<span id="c-mtproto">0</span> 
              V2R:<span id="c-v2ray">0</span> ] 
            TOTAL:<span id="proxyCount" style="font-size: 1.1em;">0</span>
        </div>
    </div>

    <div class="search-container" id="searchContainer">
        <label for="searchInput">Real-time Database Filter</label>
        <input type="text" id="searchInput" oninput="filterDatabase()" placeholder="Type to filter output (e.g., :8080, vmess, 192.168)...">
    </div>

    <textarea id="outputDisplay" readonly placeholder="[ Console output idle. Ready to extract live daily proxies... ]"></textarea>

    <div class="action-buttons">
        <button id="copyBtn" class="btn-secondary" onclick="copyToClipboard()" disabled>COPY LIST</button>
        <button id="downloadBtn" class="btn-secondary" onclick="downloadTXT()" disabled>EXPORT .TXT</button>
        <button id="downloadJsonBtn" class="btn-secondary" onclick="downloadJSON()" disabled>EXPORT .JSON</button>
        <button id="downloadCsvBtn" class="btn-secondary" onclick="downloadCSV()" disabled>EXPORT .CSV</button>
    </div>
</div>

<script>
    let globalProxyList = [];

    function getTimestamp() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day}_${hours}-${minutes}-${seconds}`;
    }

    function resetEngine() {
        globalProxyList = [];
        document.getElementById('outputDisplay').value = '';
        document.getElementById('statusText').innerText = 'System status: Memory flushed. Ready.';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchContainer').style.display = 'none';
        document.getElementById('progressWrapper').style.display = 'none';
        document.getElementById('progressBar').style.width = '0%';
        
        ['http', 'socks4', 'socks5', 'mtproto', 'v2ray'].forEach(type => {
            document.getElementById(`c-${type}`).innerText = '0';
        });
        document.getElementById('proxyCount').innerText = '0';
        
        document.getElementById('scrapeBtn').disabled = false;
        document.getElementById('copyBtn').disabled = true;
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('downloadJsonBtn').disabled = true;
        document.getElementById('downloadCsvBtn').disabled = true;
    }

    async function startScrape() {
        const type = document.getElementById('protoSelect').value;
        const scrapeBtn = document.getElementById('scrapeBtn');
        const outputDisplay = document.getElementById('outputDisplay');
        const statusText = document.getElementById('statusText');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const runChecker = document.getElementById('checkerToggle').checked;
        
        scrapeBtn.disabled = true;
        scrapeBtn.innerHTML = '<span class="loader"></span>PROCESSING...';
        
        document.getElementById('copyBtn').disabled = true;
        document.getElementById('downloadBtn').disabled = true;
        document.getElementById('downloadJsonBtn').disabled = true;
        document.getElementById('downloadCsvBtn').disabled = true;
        document.getElementById('searchContainer').style.display = 'none';
        
        outputDisplay.value = '';
        statusText.innerText = 'Status: Dispatched request to serverless backend...';
        progressWrapper.style.display = 'block';
        progressBar.style.width = '50%';

        try {
            const response = await fetch('/api/scrape', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ choice: type, runChecker: runChecker })
            });

            if (!response.ok) throw new Error('Vercel API Execution Timeout or Failure');
            
            const result = await response.json();
            progressBar.style.width = '100%';
            
            globalProxyList = result.proxies;

            for(const [cat, count] of Object.entries(result.breakdown)) {
                if(document.getElementById(`c-${cat}`)) {
                    document.getElementById(`c-${cat}`).innerText = count;
                }
            }
            document.getElementById('proxyCount').innerText = result.retainedCount;

            if (globalProxyList.length > 0) {
                outputDisplay.value = globalProxyList.join('\n');
                statusText.innerText = `Status: Vercel execution complete (${result.timeTaken}s). Live matrix deployed.`;
                document.getElementById('searchContainer').style.display = 'block';
                document.getElementById('copyBtn').disabled = false;
                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadJsonBtn').disabled = false;
                document.getElementById('downloadCsvBtn').disabled = false;
            } else {
                outputDisplay.value = '\n[!] NO PROXIES FOUND. Target lists completely unreachable.';
                statusText.innerText = 'Status: Critical API handshake failure.';
            }

        } catch (error) {
            outputDisplay.value = `\n[!] Fatal Exception: ${error.message}\nThe serverless function may have timed out. Try targeting a single protocol instead of 'ALL'.`;
            statusText.innerText = 'Status: Serverless Function Failed.';
        } finally {
            scrapeBtn.disabled = false;
            scrapeBtn.innerHTML = 'EXECUTE AUDIT';
            setTimeout(() => { progressWrapper.style.display = 'none'; }, 1000);
        }
    }

    function filterDatabase() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const display = document.getElementById('outputDisplay');
        
        if (!query) {
            display.value = globalProxyList.join('\n');
            document.getElementById('proxyCount').innerText = globalProxyList.length;
            return;
        }
        
        const filteredList = globalProxyList.filter(proxy => proxy.toLowerCase().includes(query));
        display.value = filteredList.length > 0 ? filteredList.join('\n') : '[ No runtime matching items detected inside local buffer stack ]';
        document.getElementById('proxyCount').innerText = filteredList.length;
    }

    function copyToClipboard() {
        const text = document.getElementById('outputDisplay').value;
        if (!text || text.startsWith('[ No runtime')) return;
        navigator.clipboard.writeText(text).then(() => {
            alert(`Success: Proxies loaded into operating system clipboard.`);
        });
    }

    function downloadTXT() { 
        const text = document.getElementById('outputDisplay').value;
        if(!text || text.startsWith('[ No runtime')) return;
        triggerDownload(new Blob([text], { type: 'text/plain;charset=utf-8' }), getTimestamp(), '.txt'); 
    }
    
    function downloadJSON() { 
        const currentArray = document.getElementById('outputDisplay').value.split('\n');
        if(!currentArray.length || currentArray[0].startsWith('[ No runtime')) return;
        const timestamp = getTimestamp();
        const jsonMetaExport = {
            metadata: {
                engine_version: "10.0-Stateless",
                scraped_at: timestamp,
                structural_checked: document.getElementById('checkerToggle').checked,
                total_proxies: currentArray.length
            },
            proxies: currentArray
        };
        triggerDownload(new Blob([JSON.stringify(jsonMetaExport, null, 2)], { type: 'application/json;charset=utf-8' }), timestamp, '.json'); 
    }

    function downloadCSV() {
        const currentArray = document.getElementById('outputDisplay').value.split('\n');
        if(!currentArray.length || currentArray[0].startsWith('[ No runtime')) return;
        let csvContent = "Proxy,Estimated_Protocol\n";
        currentArray.forEach(p => {
            csvContent += `${p},${p.includes("://") ? "v2ray/mtproto" : "http/socks"}\n`;
        });
        triggerDownload(new Blob([csvContent], { type: 'text/csv;charset=utf-8' }), getTimestamp(), '.csv');
    }

    function triggerDownload(blob, timestamp, extension) {
        const anchor = document.createElement('a');
        anchor.download = `Silverbullet_Proxies_${timestamp}${extension}`;
        anchor.href = window.URL.createObjectURL(blob);
        anchor.style.display = 'none';
        document.body.appendChild(anchor);
        anchor.click();
        setTimeout(() => { document.body.removeChild(anchor); window.URL.revokeObjectURL(anchor.href); }, 100);
    }
</script>
</body>
</html>
